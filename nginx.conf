# Configuración de Nginx para sushi-counter.ydns.eu
# Ubicación recomendada: /etc/nginx/sites-available/sushi-counter

# 1. Mapeo para manejar correctamente WebSockets (Upgrade vs Keep-alive)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name sushi-counter.ydns.eu;

    # Redirigir todo el tráfico HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sushi-counter.ydns.eu;

    # Certbot SSL config
    ssl_certificate /etc/letsencrypt/live/sushi-counter.ydns.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sushi-counter.ydns.eu/privkey.pem;

    # Configuraciones de seguridad recomendadas por Certbot/Mozilla
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Optimización de buffers para Socket.io
    proxy_buffers 8 32k;
    proxy_buffer_size 64k;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ------------------------------------------
    # 🔥 API — sin ETag, sin caché
    # ------------------------------------------
    location /api/ {
        proxy_pass http://localhost:50541/api/;

        # Desactivar ETag para evitar que el navegador use versiones viejas de datos dinámicos
        etag off;

        # Forzar no-cache para la API
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------
    # 🔥 WebSockets (Socket.io)
    # ------------------------------------------
    location /socket.io/ {
        proxy_pass http://localhost:50541/socket.io/;

        # Configuración esencial para WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade; # Usa el mapa definido arriba

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Evitar que Nginx cierre la conexión por inactividad demasiado rápido
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Desactivar buffer para tiempo real
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # ------------------------------------------
    # 🔥 Frontend + estáticos
    # ------------------------------------------
    location / {
        proxy_pass http://localhost:50541/;

        # Permitimos ETag para archivos estáticos (JS, CSS, Imágenes)
        etag on;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Soporte para refrescos en SPAs (aunque el backend ya lo maneja, esto no sobra)
        proxy_intercept_errors on;
    }
}
